# Default webcollector config
# See docs/PROJECT_PLAN.md section G.2 for all options

llm:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY

crawl:
  max_depth: 3
  max_pages: 1000
  max_tasks_per_minute: 60
  default_rate_limit_rps: 1.0
  max_retries: 3
  max_concurrency: 10
  respect_robots_txt: false

browser:
  playwright_pool_size: 3
  rendering_mode: adaptive

extraction:
  pdf_provider: mistral
  mistral_api_key_env: MISTRAL_API_KEY

storage:
  backend: sqlite
  db_path: ./data/webcollector.db
  file_store_path: ./data

logging:
  level: INFO
  format: text
